# ZK toolchain runner. Build once, then exec commands against the mounted repo:
#   docker compose -f compose.zk.yaml build
#   docker compose -f compose.zk.yaml run --rm zk nargo --version
#   docker compose -f compose.zk.yaml run --rm zk bash
services:
  zk:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    image: ozky-zk:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - nargo-cache:/root/nargo
      # Persist bb's downloaded CRS so it is fetched ONCE, not per `--rm` container —
      # avoids re-downloading (slow) and a transient crs.aztec.network failure that
      # otherwise crashes `bb prove` mid-run.
      - bb-crs:/root/.bb-crs
    environment:
      - CARGO_TERM_COLOR=always
    # Keep STDIN open so `run` / `exec` shells behave.
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  nargo-cache:
  bb-crs:
